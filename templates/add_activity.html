<!DOCTYPE html>
<html>
<head>
    <title>Post Activity - PlayIndia</title>
</head>
<body>
    <h1>Post a New Activity</h1>
    <form method="POST">
        <label>Sport / Activity (e.g., Cricket, Chess):</label><br>
        <input type="text" name="sport" required><br><br>
        
        <label>Location (e.g., Central Park):</label><br>
        <input type="text" name="location" required><br><br>
        
        <label>How many players needed?</label><br>
        <input type="number" name="players_needed" required><br><br>
        
        <button type="submit">Post Activity</button>
    </form>
    <br>
    <a href="/">Back to Home</a>
</body>
</html>
